name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore CryptoAlertsTelegramBot.slnx

    - name: Build
      run: dotnet build --no-restore CryptoAlertsTelegramBot.slnx

    - name: Test
      run: dotnet test --no-build CryptoAlertsTelegramBot.slnx
